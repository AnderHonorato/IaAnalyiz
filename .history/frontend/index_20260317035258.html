<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Bot - Mercado Livre</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Gerenciador de Kits e Bot ML</h1>
    </header>
    
    <div class="controls">
      <button id="start-bot" class="btn primary">Iniciar Varredura do Bot</button>
    </div>

    <section class="bot-status">
      <h2>Terminal de Execução</h2>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar">0%</div>
      </div>
      <p id="time-left" class="time-left">Tempo restante: --</p>
      <div class="terminal" id="terminal">
        <span class="log info">Aguardando início...</span>
      </div>
    </section>

    <section class="divergences">
      <h2>Divergências para Revisão</h2>
      <button id="refresh-div" class="btn secondary">Atualizar Lista</button>
      <table id="div-table">
        <thead>
          <tr>
            <th>ID Anúncio</th>
            <th>Motivo</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
