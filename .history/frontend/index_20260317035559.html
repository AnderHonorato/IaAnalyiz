<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot ML API - Painel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-noise"></div>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="app-wrapper" id="app-wrapper">
    
    <header class="glass-header">
      <div class="logo-area">
        <div class="icon-box"><i data-lucide="bot"></i></div>
        <div>
          <h1>Bot ML API</h1>
          <p>Painel de Sincronização e Validação</p>
        </div>
      </div>
      
      <div class="user-actions">
        <div class="zoom-controls">
          <button id="btn-zoom-out" title="Diminuir Zoom"><i data-lucide="zoom-out"></i></button>
          <span id="zoom-level-text">100%</span>
          <button id="btn-zoom-in" title="Aumentar Zoom"><i data-lucide="zoom-in"></i></button>
        </div>
        <div class="separator"></div>
        <div class="user-profile">
          <div class="user-info">
            <span class="user-name">Administrador</span>
            <span class="user-role">Acesso Total</span>
          </div>
          <div class="user-avatar">
            <i data-lucide="user"></i>
          </div>
        </div>
      </div>
    </header>

    <main class="main-grid">
      
      <section class="glass-card left-panel">
        <div class="card-header">
          <h2><i data-lucide="terminal"></i> Terminal de Execução</h2>
          <span class="status-badge"><span class="dot pulse"></span> Online</span>
        </div>

        <div class="controls">
          <button id="start-bot" class="btn-primary">
            <i data-lucide="play-circle"></i> Iniciar Varredura em Lote
          </button>
        </div>

        <div class="progress-section">
          <div class="progress-info">
            <span class="text-label">Progresso da Análise</span>
            <span id="time-left" class="time-left">Aguardando...</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
          </div>
        </div>

        <div class="terminal-container" id="terminal">
          <span class="log info">Pronto para iniciar conexão com a API...</span>
        </div>
      </section>

      <section class="glass-card right-panel">
        <div class="card-header">
          <h2><i data-lucide="alert-triangle"></i> Divergências Encontradas</h2>
          <button id="refresh-div" class="btn-icon" title="Atualizar Lista">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>

        <div class="table-container custom-scrollbar">
          <table id="div-table">
            <thead>
              <tr>
                <th>ID Anúncio (ML)</th>
                <th>Motivo da Divergência</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody>
              </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
